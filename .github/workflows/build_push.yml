name: CI
on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'src/**'
      - 'gradle/**'
      - 'gradlew*'
      - 'settings.gradle*'
      - 'build.gradle*'
      - 'gradle.properties'
      - '.github/scripts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 65

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      individualMatrix: ${{ steps.matrices.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - id: changed-libs
        uses: tj-actions/changed-files@v42
        with:
          files: lib/

      - if: steps.changed-libs.outputs.any_changed == 'true'
        run: ./.github/scripts/bump-versions.py ${{ steps.changed-libs.outputs.all_changed_files }}

      - uses: gradle/wrapper-validation-action@v3

      - id: matrices
        uses: actions/github-script@v7
        env:
          NUM_MODULES: ${{ fromJSON(steps.count.outputs.modules) }}
        with:
          script: |
            const num = parseInt(process.env.NUM_MODULES || '0');
            const size = parseInt(process.env.CI_CHUNK_SIZE || '65');
            const chunks = Math.ceil(num / size);
            core.setOutput('matrix', JSON.stringify({
              chunk: Array.from({length: chunks}, (_, i) => i)
            }));

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.individualMatrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle
      - uses: gradle/actions/setup-gradle@v3
      - env:
          CI_CHUNK_NUM: ${{ matrix.chunk }}
        run: ./gradlew -p src assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: apks-${{ matrix.chunk }}
          path: '**/build/outputs/apk/**/*.apk'

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          path: main
      - uses: actions/download-artifact@v4
        with:
          path: apks/
      - uses: actions/setup-java@v4
        with:
          java-version: 17
      - run: |
          cd main
          python ./.github/scripts/move-apks.py
          curl -L "$(curl -s https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest | jq -r '.assets[0].browser_download_url')" -o Inspector.jar
          java -jar Inspector.jar "repo/apk" "output.json" "tmp"
          python ./.github/scripts/create-repo.py
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add repo/
          git commit -m "Update repo [skip ci]" || echo "No changes"
          git push
