name: CI

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'src/**'
      - 'gradle/**'
      - 'gradlew*'
      - 'settings.gradle*'
      - 'build.gradle*'
      - 'gradle.properties'
      - '.github/scripts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 65

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      individualMatrix: ${{ steps.generate-matrices.outputs.individualMatrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Find lib changes
        id: modified-libs
        uses: tj-actions/changed-files@v42
        with:
          files: lib/
          files_ignore: lib/**.md

      - name: Bump extensions versions
        if: steps.modified-libs.outputs.any_changed == 'true'
        run: |
          ./.github/scripts/bump-versions.py ${{ steps.modified-libs.outputs.all_changed_files }}

      - uses: gradle/wrapper-validation-action@v3

      - name: Count modules
        run: |
          # Count actual Gradle projects
          MAP=$(./gradlew projects --console=plain -q | grep -oP '^\s*:\K[^:]+$' | paste -sd ' ')
          echo "PROJECTS_MAP<<EOF" >> $GITHUB_OUTPUT
          echo "$MAP" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "NUM_INDIVIDUAL_MODULES=$(echo $MAP | wc -w)" >> $GITHUB_ENV

      - id: generate-matrices
        name: Generate matrices
        uses: actions/github-script@v7
        with:
          script: |
            const numModules = parseInt(process.env.NUM_INDIVIDUAL_MODULES || '0');
            const chunkSize = parseInt(process.env.CI_CHUNK_SIZE || '65');
            
            if (numModules === 0) {
              core.setOutput('individualMatrix', JSON.stringify({}));
              return;
            }
            
            const numChunks = Math.ceil(numModules / chunkSize);
            console.log(`Modules: ${numModules}, Chunks: ${numChunks}`);
            
            core.setOutput('individualMatrix', JSON.stringify({
              chunk: Array.from({length: numChunks}, (_, i) => i)
            }));

  build_individual:
    name: Build (chunk ${{ matrix.chunk }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.individualMatrix) }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-dependency-path: |
            **/build.gradle.kts
            **/build.gradle
            gradle.properties
            settings.gradle.kts
            settings.gradle

      - name: Build chunk ${{ matrix.chunk }}
        env:
          CI_CHUNK_NUM: ${{ matrix.chunk }}
        run: ./gradlew -p src assembleRelease --stacktrace

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apks-chunk-${{ matrix.chunk }}
          path: '**/build/outputs/apk/**/*.apk'
          retention-days: 7

  publish_repo:
    name: Publish Repo
    needs: [build_individual, prepare]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.build_individual.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: apks/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Create repository
        run: |
          cd main
          python ./.github/scripts/move-apks.py
          
          # Download inspector
          INSPECTOR_URL=$(curl -s "https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')
          curl -L "$INSPECTOR_URL" -o Inspector.jar
          
          java -jar Inspector.jar "repo/apk" "output.json" "tmp"
          python ./.github/scripts/create-repo.py

      - name: Commit repo changes
        run: |
          cd main
          ./.github/scripts/commit-repo.sh
