name: Build & Publish
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix Gradle ⚠️
        run: |
          # تحقق من pluginManagement
          if ! grep -q "repositoriesMode.set" settings.gradle.kts; then
            sed -i '/pluginManagement {/,/}/ {
              /repositories {/a\
                  repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              }
            }' settings.gradle.kts || echo "Settings fixed"
          fi
          
          # علّق google() في build.gradle.kts
          sed -i 's/google()/\/\/ google()/g' build.gradle.kts
          
          echo "=== After Fix ==="
          grep -n "repositoriesMode\|google()" settings.gradle.kts build.gradle.kts

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build
        run: ./gradlew clean assembleRelease

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: "**/build/outputs/apk/release/*.apk"

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: apks/

      - name: Repo
        run: |
          apt-get update -qq && apt-get install -y jq
          mkdir -p repo/apk
          find apks -name "*.apk" -exec cp {} repo/apk/ \;
          
          curl -L "$(curl -s https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest | jq -r '.assets[0].browser_download_url')" -o Inspector.jar
          
          java -jar Inspector.jar repo/apk output.json tmp
          python .github/scripts/create-repo.py

      - name: Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add repo/
          git commit -m "Update repo [skip ci]" || exit 0
          git push || exit 0
