name: Build & Publish
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Debug Structure
        run: |
          echo "=== Project Structure ==="
          find src/ -type f | head -20 || echo "src/ empty!"
          ls -la src/ || echo "No src folder"

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build Extensions
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon || ./gradlew tasks

      - name: Find APKs
        run: |
          find . -name "*.apk" -type f || echo "No APKs found"

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-apks
          path: |
            **/build/outputs/apk/**/*.apk
            src/**/build/outputs/apk/**/*.apk

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          path: apks/

      - name: Setup Tools
        run: |
          sudo apt update -qq
          sudo apt install -y jq python3

      - name: Generate Repo
        run: |
          mkdir -p repo/apk
          find apks -name "*.apk" -exec cp {} repo/apk/ \; 2>/dev/null || echo "No APKs to copy"
          
          curl -s https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest | \
            jq -r '.assets[0].browser_download_url' | \
            xargs curl -L -o Inspector.jar || echo "Inspector download failed"
          
          java -jar Inspector.jar repo/apk output.json tmp 2>/dev/null || echo "Inspector failed"
          ls -la repo/ || echo "Repo generation failed"

      - name: Commit Repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add repo/ -f
          git commit -m "Update repo [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed"
