name: Build ALL extensions
on:
  push:
    branches: [main]  # ✅ أضف هذا
  workflow_dispatch:  # ✅ حافظ عليه
    inputs:
      git-ref:        # ✅ بس خلّي هذا الـ input
        default: 'main'

env:
  CI_CHUNK_SIZE: 65

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      individualMatrix: ${{ steps.matrices.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4  # ✅ مشروعك مو repo ثاني

      - name: Count modules
        id: count
        run: |
          NUM=$(find src/ -maxdepth 2 -name "build.gradle*" | wc -l)
          echo "NUM_INDIVIDUAL_MODULES=$NUM" >> $GITHUB_OUTPUT

      - id: matrices
        uses: actions/github-script@v7
        with:
          script: |
            const num = parseInt(process.env.NUM_INDIVIDUAL_MODULES || '0');
            const size = 65;
            const chunks = Math.ceil(num / size);
            core.setOutput('matrix', JSON.stringify({chunk: Array.from({length: chunks}, (_,i)=>i)}));

  build_all:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.individualMatrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17  # ✅ 17 مو 21 (لتوافق)

      - name: Build chunk ${{ matrix.chunk }}
        env:
          CI_CHUNK_NUM: ${{ matrix.chunk }}
        run: ./gradlew -p src assembleRelease  # ✅ Release مو Debug

      - uses: actions/upload-artifact@v4
        with:
          name: apks-${{ matrix.chunk }}
          path: src/**/build/outputs/apk/release/*.apk  # ✅ مسار صحيح

  publish:
    needs: build_all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: apks/

      - uses: actions/setup-java@v4
        with:
          java-version: 17

      - name: Create repo
        run: |
          mkdir -p repo/apk
          find apks -name "*.apk" -exec cp {} repo/apk/ \;
          
          apt-get update -qq && apt-get install -y jq
          curl -L "$(curl -s https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest | jq -r '.assets[0].browser_download_url')" -o Inspector.jar
          
          java -jar Inspector.jar repo/apk output.json tmp
          python .github/scripts/create-repo.py

      - name: Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add repo/
          git commit -m "Update repo [skip ci]" || exit 0
          git push
