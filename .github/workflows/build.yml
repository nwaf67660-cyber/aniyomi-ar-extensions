name: Build & Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      - name: Build APKs
        run: ./gradlew :src:assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: src/**/build/outputs/apk/release/*.apk

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: apks/

      - uses: actions/setup-java@v4
        with:
          java-version: 17

      - name: Deploy repo
        run: |
          # Copy APKs
          mkdir -p repo/apk
          cp apks/extension-apks/*.apk repo/apk/
          
          # Inspector
          curl -L "$(curl -s https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest | jq -r '.assets[0].browser_download_url')" -o Inspector.jar
          
          # Generate
          java -jar Inspector.jar repo/apk output.json tmp
          python .github/scripts/create-repo.py

      - name: Push updates
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add repo/
          git commit -m "Update repo" || exit 0
          git push
