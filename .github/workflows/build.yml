name: Build & Publish
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix Gradle Repositories
        run: |
          # Backup original files
          cp settings.gradle.kts settings.gradle.kts.bak
          cp build.gradle.kts build.gradle.kts.bak
          
          # Fix settings.gradle.kts - add repositoriesMode
          sed -i '1i pluginManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}\n' settings.gradle.kts
          
          # Comment google() in build.gradle.kts
          sed -i 's|google()|#google()|g' build.gradle.kts

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - uses: gradle/wrapper-validation-action@v3

      - uses: gradle/actions/setup-gradle@v3

      - name: Build APKs
        run: ./gradlew clean :src:assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: |
            src/**/build/outputs/apk/release/*.apk

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: apks/

      - uses: actions/setup-java@v4
        with:
          java-version: 17

      - name: Deploy Repository
        run: |
          # Install jq
          sudo apt-get update -qq
          sudo apt-get install -y jq
          
          # Setup repo/apk
          mkdir -p repo/apk
          find apks/ -name "*.apk" -exec cp {} repo/apk/ \; || true
          
          # Download Inspector
          INSPECTOR_URL=$(curl -s "https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')
          curl -L "$INSPECTOR_URL" -o Inspector.jar
          
          # Generate repo
          java -jar Inspector.jar repo/apk output.json tmp
          python .github/scripts/create-repo.py

      - name: Commit & Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add repo/
          
          if git diff --staged --quiet; then
            echo "✅ No repo changes needed"
          else
            git commit -m "chore: update extensions repo [skip ci]"
            git push origin main
            echo "✅ Repo updated successfully!"
          fi
