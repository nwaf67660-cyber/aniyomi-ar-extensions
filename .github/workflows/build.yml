name: Build & Publish
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean :src:assembleRelease --no-daemon --stacktrace

      - name: List APKs
        run: find src/ -name "*.apk" -type f

      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: src/**/build/outputs/apk/release/*.apk

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: apks/

      - name: Publish Repo
        run: |
          apt-get update -qq && apt-get install -y jq
          
          mkdir -p repo/apk
          find apks -name "*.apk" -exec cp {} repo/apk/ \;
          
          curl -s https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest | \
            jq -r '.assets[0].browser_download_url' | \
            xargs curl -L -o Inspector.jar
          
          java -jar Inspector.jar repo/apk output.json tmp
          python .github/scripts/create-repo.py

      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add repo/
          if ! git diff --staged --quiet; then
            git commit -m "Update repo"
            git push
          fi
