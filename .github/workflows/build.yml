name: Build & Publish
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Fix Gradle Repositories ⚠️
        run: |
          # إصلاح settings.gradle.kts
          cat >> settings.gradle.kts << 'EOF'
          
          pluginManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          EOF
          
          # تعليق google() في build.gradle.kts
          sed -i.bak 's|google()|// google()|g' build.gradle.kts
          echo "✅ Fixed repositories!"

      - name: Debug Structure
        run: |
          echo "=== Fixed files ==="
          head -20 settings.gradle.kts
          grep -n "google()" build.gradle.kts || echo "No google() found"

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build
        run: |
          ./gradlew clean assembleRelease --no-daemon

      - name: Find APKs
        run: find . -name "*.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: |
            **/build/outputs/apk/**/*.apk

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          path: apks/

      - name: Publish Repo
        run: |
          apt-get update -qq && apt-get install -y jq
          mkdir -p repo/apk
          find apks -name "*.apk" -exec cp {} repo/apk/ \;
          
          curl -L "$(curl -s https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest | jq -r '.assets[0].browser_download_url')" -o Inspector.jar
          
          java -jar Inspector.jar repo/apk output.json tmp
          python .github/scripts/create-repo.py

      - name: Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add repo/
          git commit -m "Update repo [skip ci]" || exit 0
          git push || exit 0
