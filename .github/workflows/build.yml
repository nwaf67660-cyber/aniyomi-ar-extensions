name: Build & Publish
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          # عدّ الـ modules الحقيقية
          NUM_MODULES=$(find src/ -type f -path "*/build.gradle*" -o -path "*/build.gradle.kts" | wc -l)
          
          if [ "$NUM_MODULES" -eq 0 ]; then
            echo "No modules found! Listing structure:"
            find src/ -type f | head -20
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          else
            CHUNKS=$(( (NUM_MODULES + 64) / 65 ))
            echo "Found $NUM_MODULES modules, $CHUNKS chunks"
            echo "matrix={\"chunk\":[$(seq 0 $((CHUNKS-1)) | paste -sd ,)]}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    if: fromJson(needs.prepare.outputs.matrix.include) != '' || contains(fromJson(needs.prepare.outputs.matrix).chunk, 0)
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build chunk ${{ matrix.chunk }}
        run: ./gradlew -p src assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: apks-${{ matrix.chunk }}
          path: src/**/build/outputs/apk/release/*.apk

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: apks/

      - uses: actions/setup-java@v4
        with:
          java-version: 17

      - name: Generate repo
        run: |
          apt-get update -qq && apt-get install -y jq
          mkdir -p repo/apk
          find apks -name "*.apk" -exec cp {} repo/apk/ \;
          
          curl -L "$(curl -s https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest | jq -r '.assets[0].browser_download_url')" -o Inspector.jar
          
          java -jar Inspector.jar repo/apk output.json tmp
          python .github/scripts/create-repo.py || echo "Create repo failed"

      - name: Push repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add repo/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update repo [skip ci]"
            git push
          fi
